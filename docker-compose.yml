services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh ./scripts/docker-web-entrypoint.sh
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: unless-stopped
    networks:
      exchangethb_net:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh ./scripts/docker-worker-entrypoint.sh
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: unless-stopped
    networks:
      exchangethb_net:
        ipv4_address: 172.30.0.12
    healthcheck:
      test: ["CMD-SHELL", "sh ./scripts/check-worker-heartbeat.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exchangethb
      POSTGRES_USER: exchangethb
      POSTGRES_PASSWORD: exchangethb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      exchangethb_net:
        ipv4_address: 172.30.0.11
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchangethb -d exchangethb"]
      interval: 30s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:

networks:
  exchangethb_net:
    name: exchangethb_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
