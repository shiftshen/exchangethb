services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --include=dev && npm run build && npm run start"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
  worker:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --include=dev && npx -y tsx worker/index.ts"
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    profiles:
      - worker
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: exchangethb
      POSTGRES_USER: exchangethb
      POSTGRES_PASSWORD: exchangethb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchangethb -d exchangethb"]
      interval: 30s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
